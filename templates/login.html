<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FaceAttend</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg" style="width: 400px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-camera-video-fill text-primary" style="font-size: 3rem;"></i>
        <h3 class="fw-bold mt-2">FaceAttend</h3>
        <p class="text-muted small">Face Recognition Attendance System</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">
        <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <div class="text-center mt-4">
        <small class="text-muted">Default admin: admin@attendance.com / admin123</small>
      </div>
    </div>
  </div>
</body>
</html>
