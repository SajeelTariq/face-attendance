{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-person-plus me-2"></i>Add New Student
      </div>
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">
          <i class="bi bi-check-circle me-2"></i>{{ success }}
          <a href="/admin/students" class="alert-link ms-2">View all students →</a>
        </div>
        {% endif %}

        <form method="post" action="/admin/students/add">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="name" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Roll Number</label>
              <input type="text" name="roll_no" class="form-control" placeholder="e.g. 2022-BSCS-01" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" value="student123" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Batch</label>
              <input type="text" name="batch" class="form-control" placeholder="e.g. 2022-BSCS" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Section</label>
              <input type="text" name="section" class="form-control" placeholder="e.g. A" required />
            </div>
            {% if courses %}
            <div class="col-12">
              <label class="form-label fw-semibold">Enroll in Courses</label>
              <div class="row g-2">
                {% for c in courses %}
                <div class="col-md-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="course_ids" value="{{ c.id }}" id="course_{{ c.id }}" />
                    <label class="form-check-label" for="course_{{ c.id }}">{{ c.code }} — {{ c.name }}</label>
                  </div>
                </div>
                {% endfor %}
              </div>
            </div>
            {% endif %}
            <div class="col-12 mt-2">
              <button type="submit" class="btn btn-primary fw-semibold px-4">
                <i class="bi bi-plus-circle me-2"></i>Add Student
              </button>
              <a href="/admin/students" class="btn btn-outline-secondary ms-2">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
